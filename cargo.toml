[package]
name = "nexus_ai_server"
version = "0.1.0"
edition = "2021"

# ========================= Dependencies =========================
[dependencies]
axum = "0.6"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sled = "0.34"
uuid = { version = "1.0", features = ["v4"] }
chrono = "0.4"
rand = "0.8"
anyhow = "1.0"
bincode = "1.3"
aes-gcm = "0.10"
tokenizers = "0.13"
sha2 = "0.10"
hnsw_rs = "0.1"
